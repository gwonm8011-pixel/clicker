<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>실시간 클릭 카운터</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --accent: #ff3cac; --accent2: #00f5ff; --accent3: #ffea00;
      --text: #f0f0ff; --muted: #555577;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,60,172,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,60,172,0.04) 1px, transparent 1px);
      background-size: 40px 40px; animation: gridShift 20s linear infinite; pointer-events: none;
    }
    @keyframes gridShift { from { background-position: 0 0; } to { background-position: 40px 40px; } }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; animation: orbFloat 8s ease-in-out infinite; }
    .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
    @keyframes orbFloat { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(30px,20px); } }

    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; z-index: 200; transition: opacity 0.5s ease;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .loading-icon { font-size: 3rem; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Black Han Sans', sans-serif; font-size: 1.2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 40px; opacity: 0; transition: opacity 0.5s ease; }
    .wrapper.show { opacity: 1; }

    .live-badge { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,60,172,0.1); border: 1px solid rgba(255,60,172,0.3); border-radius: 99px; padding: 5px 14px; font-size: 0.75rem; color: var(--accent); letter-spacing: 0.1em; font-weight: 700; text-transform: uppercase; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

    header { text-align: center; }
    header h1 { font-family: 'Black Han Sans', sans-serif; font-size: clamp(2rem, 6vw, 3.5rem); background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; }
    header p { margin-top: 10px; color: var(--muted); font-size: 0.9rem; }

    .stats { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 28px; text-align: center; min-width: 120px; }
    .stat-card.highlight { border-color: rgba(0,245,255,0.3); }
    .stat-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Black Han Sans', sans-serif; font-size: 2.4rem; line-height: 1; }
    .stat-value.bump { animation: bump 0.2s ease; }
    @keyframes bump { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    #total-count { color: var(--text); } #my-count { color: var(--accent2); } #online-count { color: var(--accent3); }

    .click-area { position: relative; }
    #particles { position: absolute; inset: 0; pointer-events: none; }
    .particle { position: absolute; width: 8px; height: 8px; border-radius: 50%; animation: flyOut 0.7s ease-out forwards; }
    @keyframes flyOut { 0% { opacity: 1; transform: translate(0,0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); } }

    .click-btn { width: 200px; height: 200px; border-radius: 50%; border: none; cursor: pointer; position: relative; background: transparent; outline: none; -webkit-tap-highlight-color: transparent; }
    .click-btn::before, .click-btn::after { content: ''; position: absolute; inset: 0; border-radius: 50%; }
    .click-btn::before { background: radial-gradient(circle at 35% 35%, #ff6ec7, #cc0077); box-shadow: 0 0 40px rgba(255,60,172,0.4), 0 0 80px rgba(255,60,172,0.15); transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .click-btn::after { inset: -12px; border: 2px solid rgba(255,60,172,0.3); background: transparent; animation: ringPulse 2.5s ease-in-out infinite; }
    @keyframes ringPulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.08); opacity: 0.2; } }
    .click-btn:active::before { transform: scale(0.9); box-shadow: 0 0 60px rgba(255,60,172,0.8); }
    .btn-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; z-index: 2; pointer-events: none; }
    .btn-icon { font-size: 2.2rem; } .btn-text { font-family: 'Black Han Sans', sans-serif; font-size: 1.05rem; color: #fff; }

    .feed-container { width: 320px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .feed-header { padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    #feed { max-height: 150px; overflow-y: auto; }
    #feed::-webkit-scrollbar { width: 3px; } #feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .feed-item { padding: 9px 18px; font-size: 0.82rem; border-bottom: 1px solid rgba(30,30,46,0.5); display: flex; align-items: center; gap: 10px; animation: slideIn 0.25s ease; color: var(--muted); }
    .feed-item.mine { color: var(--accent2); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .feed-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .feed-time { margin-left: auto; font-size: 0.7rem; opacity: 0.5; }

    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; transition: background 0.3s; }
    .status-dot.connected { background: #00e676; box-shadow: 0 0 6px #00e676; }
    .status-dot.error { background: #ff5252; box-shadow: 0 0 6px #ff5252; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-icon">🔥</div>
    <div class="loading-text">Firebase 연결 중...</div>
  </div>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="wrapper" id="main-wrapper">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <header>
        <h1>실시간 클릭 카운터</h1>
        <p>지금 이 순간, 모두의 클릭이 연결됩니다</p>
      </header>
    </div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">전체 클릭</div>
        <div class="stat-value" id="total-count">0</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-label">내 클릭</div>
        <div class="stat-value" id="my-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">접속자</div>
        <div class="stat-value" id="online-count" style="color:var(--accent3)">-</div>
      </div>
    </div>
    <div class="click-area">
      <div id="particles"></div>
      <button class="click-btn" id="click-btn">
        <div class="btn-inner">
          <span class="btn-icon">👆</span>
          <span class="btn-text">클릭!</span>
        </div>
      </button>
    </div>
    <div class="feed-container">
      <div class="feed-header">
        <div class="live-dot" style="width:5px;height:5px;"></div>
        실시간 클릭 피드
      </div>
      <div id="feed"></div>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">연결 중...</span>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, push, runTransaction, set, onDisconnect, limitToLast, query }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCrmvPjTgGk-knXKwtuzOuHQ1dfzs2xCHk",
      authDomain: "clicker-c81a5.firebaseapp.com",
      databaseURL: "https://clicker-c81a5-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "clicker-c81a5",
      storageBucket: "clicker-c81a5.firebasestorage.app",
      messagingSenderId: "930792992604",
      appId: "1:930792992604:web:2f520049086e8813289b99"
    };

    const userId = 'u_' + Math.random().toString(36).slice(2, 8);
    let myClicks = 0;

    try {
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const totalRef = ref(db, 'totalClicks');

      // Presence
      const presenceRef = ref(db, 'presence/' + userId);
      set(presenceRef, { online: true, since: Date.now() });
      onDisconnect(presenceRef).remove();

      // Total clicks (realtime)
      onValue(totalRef, (snap) => {
        const val = snap.val() || 0;
        const el = document.getElementById('total-count');
        el.textContent = val.toLocaleString();
        el.classList.remove('bump');
        void el.offsetWidth;
        el.classList.add('bump');
      });

      // Online users
      onValue(ref(db, 'presence'), (snap) => {
        const count = snap.exists() ? Object.keys(snap.val()).length : 0;
        document.getElementById('online-count').textContent = count;
      });

      // Feed
      onValue(query(ref(db, 'recentClicks'), limitToLast(30)), (snap) => {
        if (!snap.exists()) return;
        const items = [];
        snap.forEach(child => items.push(child.val()));
        renderFeed(items.reverse());
      });

      // Click
      document.getElementById('click-btn').addEventListener('click', () => {
        myClicks++;
        const myEl = document.getElementById('my-count');
        myEl.textContent = myClicks;
        myEl.classList.remove('bump');
        void myEl.offsetWidth;
        myEl.classList.add('bump');

        // Atomic increment
        runTransaction(totalRef, (current) => (current || 0) + 1);

        // Feed
        push(ref(db, 'recentClicks'), { user: userId, time: Date.now() });

        spawnParticles();
      });

      document.getElementById('status-dot').className = 'status-dot connected';
      document.getElementById('status-text').textContent = '연결됨 · ID: ' + userId;

      setTimeout(() => {
        document.getElementById('loading').classList.add('hide');
        document.getElementById('main-wrapper').classList.add('show');
      }, 800);

    } catch(e) {
      document.getElementById('loading').innerHTML =
        '<div style="color:#ff5252;font-size:1rem;text-align:center;padding:20px;">연결 실패 😢<br><small>' + e.message + '</small></div>';
    }

    function renderFeed(items) {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        const isMe = item.user === userId;
        div.className = 'feed-item' + (isMe ? ' mine' : '');
        div.innerHTML = '<div class="feed-dot"></div><span>' + (isMe ? '나' : item.user) + '의 클릭</span><span class="feed-time">' + timeAgo(item.time) + '</span>';
        feed.appendChild(div);
      });
    }

    function timeAgo(ts) {
      const d = Math.floor((Date.now() - ts) / 1000);
      if (d < 5) return '방금';
      if (d < 60) return d + '초 전';
      return Math.floor(d/60) + '분 전';
    }

    function spawnParticles() {
      const container = document.getElementById('particles');
      const colors = ['#ff3cac','#00f5ff','#ffea00','#ff6b6b','#a8ff78'];
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = Math.random() * Math.PI * 2;
        const dist = 70 + Math.random() * 60;
        p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = '50%'; p.style.top = '50%';
        p.style.marginLeft = '-4px'; p.style.marginTop = '-4px';
        container.appendChild(p);
        setTimeout(() => p.remove(), 700);
      }
    }
  </script>
</body>
</html>
